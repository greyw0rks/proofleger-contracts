name: ProofLedger CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Clarinet Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Clarinet
        run: |
          wget -nv https://github.com/hirosystems/clarinet/releases/download/v2.4.0/clarinet-linux-x64-glibc.tar.gz
          tar -xf clarinet-linux-x64-glibc.tar.gz && chmod +x ./clarinet && sudo mv ./clarinet /usr/local/bin
      - run: clarinet check
      - run: clarinet test

  verify:
    name: Verify Mainnet Deployments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/verify-deployment.js